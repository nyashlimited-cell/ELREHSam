  <h1>Invoice</h1>
  <div id="invoice">Loading…</div>
  <div id="actions"></div>

  <script>
    // sidebar toggle logic
    document.addEventListener('DOMContentLoaded', function() {
      const sidebarToggle = document.getElementById("sidebarToggle");
      const sidebar = document.getElementById("sidebar");
      const sidebarClose = document.getElementById("sidebarClose");
      if (sidebarToggle && sidebar) {
        sidebarToggle.addEventListener("click", function () {
          sidebar.classList.toggle("active");
        });
        if (sidebarClose) {
          sidebarClose.addEventListener("click", function () {
            sidebar.classList.remove("active");
          });
        }
        document.querySelectorAll(".sidebar-item").forEach(item => {
          item.addEventListener("click", function () {
            sidebar.classList.remove("active");
          });
        });
      }
    });

    async function load() {
      const params = new URLSearchParams(location.search);
      const id = params.get('invoiceId');
      if (!id) return document.getElementById('invoice').textContent = 'No invoiceId provided in query string';
      const res = await fetch('/api/payments/invoice/' + id);
      if (!res.ok) return document.getElementById('invoice').textContent = 'Invoice not found';
      const invoice = await res.json();
      document.getElementById('invoice').innerHTML = `<pre>${JSON.stringify(invoice, null, 2)}</pre>`;
      if (invoice.status !== 'paid') {
        document.getElementById('actions').innerHTML = `<button id="payBtn">Mark Paid (simulate)</button>`;
        document.getElementById('payBtn').addEventListener('click', async ()=>{
          const r = await fetch('/api/payments/pay/' + id, {method:'POST'});
          if (r.ok) location.reload();
        });
      }
    }
    load();
  </script>
