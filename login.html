    <style>
        .login-container {
            max-width: 400px;
            margin: 100px auto;
            padding: 30px;
            background: #f9f9f9;
            border-radius: 8px;
            color: #000;
        }
        .login-container h1 {
            text-align: center;
            margin-bottom: 20px;
            font-family: 'Playfair Display', serif;
            color: #333;
        }
        .login-container form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .login-container input {
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
        }
        .login-container input:focus {
            outline: none;
            border-color: #d4a574;
            box-shadow: 0 0 5px rgba(212, 165, 116, 0.2);
        }
        .login-container button {
            padding: 12px;
            background: #d4a574;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .login-container button:hover {
            background: #c4945f;
        }
    </style>
</head>
